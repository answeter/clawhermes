services:
  clawhermes:
    build:
      context: .
      args:
        # 渠道：设置非空值启用（如 WITH_LARK=1）
        WITH_LARK: ${WITH_LARK:-}
        WITH_WEIXIN: ${WITH_WEIXIN:-}
        WITH_QQ: ${WITH_QQ:-}
    container_name: clawhermes
    ports:
      - "${CH_GATEWAY_PORT:-18789}:18789"
    env_file:
      - .env
    environment:
      - CH_GATEWAY_HOST=0.0.0.0
      - CH_GATEWAY_PORT=${CH_GATEWAY_PORT:-18789}
      - CH_TOOLS_PROFILE=${CH_TOOLS_PROFILE:-standard}
      - CH_DATA_DIR=/data/.clawhermes
    volumes:
      - clawhermes_data:/data/.clawhermes
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  clawhermes_data:
